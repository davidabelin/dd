<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/doubledigits.css') }}">
  </head>
  <body class="dd-app">
    <header class="dd-shell-header">
      <a class="dd-brand" href="{{ url_for('main.home') }}">Double-digits</a>
      <nav class="dd-shell-nav" aria-label="Double-digits">
        <a href="{{ aix_hub_url }}">AIX Labs</a>
        <a href="{{ aix_contact_url }}">Contact</a>
        <a href="{{ aix_privacy_url }}">Privacy</a>
        <a href="{{ aix_toc_url }}">TOC</a>
      </nav>
    </header>
    <main class="dd-main">
      {% block content %}{% endblock %}
    </main>
    <footer class="dd-shell-footer">
      <div class="dd-shell-footer-inner">
        <p class="footer-copy aix-footer-copy">
          <img class="copyleft-mark" src="{{ aix_hub_url.rstrip('/') }}/static/icons/copyleft.svg" alt="" aria-hidden="true" width="16" height="16">
          <span>2026 AIX Protodyne</span>
        </p>
        <nav class="dd-footer-links" aria-label="Double-digits footer">
          <a href="{{ aix_contact_url }}">Contact Us</a>
          <a href="{{ aix_privacy_url }}">Privacy</a>
          <a href="{{ aix_toc_url }}">AIX TOC</a>
        </nav>
      </div>
    </footer>
    <script id="dd-frontend-config" type="application/json">{{ dd_frontend_config | tojson }}</script>
  </body>
</html>
